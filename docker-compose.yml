services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ai_marketing
      POSTGRES_PASSWORD: ai_marketing
      POSTGRES_DB: ai_marketing
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://ai_marketing:ai_marketing@postgres:5432/ai_marketing
      JWT_SECRET: dev-change-me-in-production
      LLM_ENCRYPTION_KEY: dev-32-byte-key-change-in-prod!!
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5174,http://localhost:5174
    depends_on:
      - postgres
    volumes:
      - ./apps/api:/app

volumes:
  pgdata:
